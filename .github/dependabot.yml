version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      gomod-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
