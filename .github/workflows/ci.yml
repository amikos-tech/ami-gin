name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run tests
        run: gotestsum --format short-verbose --packages="./..." --junitfile unit.xml -- -short -race -coverprofile=coverage.out -timeout=30m ./...

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-go${{ matrix.go-version }}
          path: |
            coverage.out
            unit.xml
          if-no-files-found: error

      - name: Coverage Report
        if: matrix.go-version == '1.26'
        run: |
          echo "### Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --config=.golangci.yml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Build
        run: make build

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26"
          go-package: ./...
          repo-checkout: false
          output-format: text
