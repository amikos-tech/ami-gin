version: "2"
run:
  modules-download-mode: readonly
  timeout: 5m
  concurrency: 4

linters:
  enable:
    - dupword
    - errorlint
    - goconst
    - gocritic
    - gosec
    - mirror
    - nilerr
    - prealloc
    - unconvert
    - unparam
  settings:
    gocritic:
      disable-all: false
    gosec:
      excludes:
        - G115
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1020
  exclusions:
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - errcheck
        path: examples/
      # CLI writes status/errors via fmt.Fprintf to stdout/stderr; ignoring
      # those errors is standard practice for terminal output.
      - linters:
          - errcheck
        path: cmd/gin-index/

issues:
  max-same-issues: 0

formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/amikos-tech/ami-gin)
        - blank
        - dot
      custom-order: true
